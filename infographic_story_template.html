<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #d4a849;
        --gold-light: #f0d078;
        --gold-deep: #c89030;
        --bg-deep: #06061a;
        --text: #e8e4f0;
        --text-dim: #9890a8;
        --amber: #d4863a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg-deep);
    }

    .canvas {
        width: 1080px;
        height: 1920px;
        position: relative;
        overflow: hidden;
    }

    .bg {
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse 80% 40% at 50% 25%, rgba(212,134,58,0.1) 0%, transparent 60%),
            radial-gradient(ellipse 60% 30% at 55% 20%, rgba(212,168,73,0.06) 0%, transparent 50%),
            linear-gradient(175deg, #0a0a24 0%, #06061a 25%, #080818 50%, #04040e 100%);
    }

    .star {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.8);
    }

    /* ── Top brand ── */
    .top-bar {
        position: absolute;
        top: 60px;
        left: 60px;
        right: 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
    }
    .brand {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 20px;
        letter-spacing: 4px;
        color: var(--gold);
        text-transform: uppercase;
        opacity: 0.7;
    }
    .moon-badge {
        font-size: 16px;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* ── Visual zone (top half) ── */
    .visual-zone {
        position: absolute;
        top: 6%;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        height: 26%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .aspect-visual { position: relative; width: 100%; height: 100%; }

    .planet-orb {
        position: absolute;
        border-radius: 50%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    .planet-orb.primary {
        width: 180px; height: 180px;
        border: none;
        top: 50%; left: 25%;
        transform: translate(-50%, -50%);
        overflow: visible;
    }
    .planet-orb.secondary {
        width: 155px; height: 155px;
        border: none;
        top: 50%; right: 25%;
        transform: translate(50%, -50%);
        overflow: visible;
    }
    .planet-orb .planet-sphere {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        z-index: 0;
    }
    .planet-orb .planet-label {
        position: absolute;
        bottom: -38px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        white-space: nowrap;
        z-index: 2;
    }
    .planet-orb .name {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 18px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text);
        display: block;
    }
    .planet-orb .sign-info { font-size: 15px; color: var(--text-dim); margin-top: 3px; display: block; }

    .aspect-line {
        position: absolute;
        top: 50%; left: 32%;
        width: 36%; height: 2px;
        transform: translateY(-50%);
    }
    .aspect-line .line {
        width: 100%; height: 1px;
        background: linear-gradient(90deg, var(--gold), rgba(212,168,73,0.3) 50%, rgba(120,140,220,0.5));
        box-shadow: 0 0 8px rgba(212,168,73,0.3);
    }
    .aspect-line .label {
        position: absolute; top: -30px; left: 50%;
        transform: translateX(-50%);
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600; font-size: 20px;
        color: var(--gold); letter-spacing: 2px;
        text-transform: uppercase; white-space: nowrap;
        text-shadow: 0 0 12px rgba(212,168,73,0.4);
    }
    .aspect-line .orb-label {
        position: absolute; bottom: -20px; left: 50%;
        transform: translateX(-50%);
        font-size: 15px; color: var(--text-dim); white-space: nowrap;
    }

    /* Moon visual for story */
    .moon-visual {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 220px; height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 35%, #e8e4f0, #b0a8c0 50%, #706880 80%, #3a3450);
        box-shadow: 0 0 80px rgba(200,190,220,0.2);
    }
    .moon-visual .phase-shadow {
        position: absolute; inset: 0; border-radius: 50%;
        background: {{MOON_SHADOW_GRADIENT}};
    }
    .moon-visual .label {
        position: absolute; bottom: -40px; left: 50%;
        transform: translateX(-50%);
        font-size: 16px; color: var(--text);
        letter-spacing: 2px; white-space: nowrap;
    }

    /* ── Title (middle) ── */
    .title-block {
        position: absolute;
        top: 34%;
        left: 0; right: 0;
        text-align: center;
        padding: 0 60px;
        z-index: 10;
    }
    .event-title {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 700;
        font-size: 56px;
        color: var(--gold-light);
        line-height: 1.15;
        text-shadow: 0 0 24px rgba(212,168,73,0.25);
        margin-bottom: 16px;
    }
    .event-subtitle {
        font-family: 'Inter', sans-serif;
        font-weight: 300;
        font-size: 22px;
        color: var(--text-dim);
        line-height: 1.5;
        max-width: 85%;
        margin: 0 auto;
    }
    .divider {
        width: 80px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        margin: 24px auto 0;
        opacity: 0.5;
    }

    /* ── Educational fact ── */
    .fact-panel {
        position: absolute;
        top: 52%;
        left: 60px;
        right: 60px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 28px 32px;
        z-index: 10;
    }
    .fact-panel .fact-title {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 20px;
        color: var(--gold);
        margin-bottom: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .fact-panel .fact-text {
        font-size: 20px;
        color: var(--text);
        line-height: 1.6;
    }

    /* ── Data row ── */
    /* ── Orbital arcs ── */
    .orbital-arc {
        position: absolute;
        top: 64%;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 250px;
        border: 1px solid rgba(212,168,73,0.06);
        border-radius: 50%;
        border-top-color: transparent;
        border-left-color: transparent;
        z-index: 1;
    }
    .orbital-arc-2 {
        position: absolute;
        top: 60%;
        left: 50%;
        transform: translateX(-50%);
        width: 900px;
        height: 350px;
        border: 1px solid rgba(120,140,220,0.04);
        border-radius: 50%;
        border-bottom-color: transparent;
        border-right-color: transparent;
        z-index: 1;
    }

    .data-row {
        position: absolute;
        bottom: 24%;
        left: 60px;
        right: 60px;
        display: flex;
        justify-content: center;
        gap: 40px;
        z-index: 10;
    }
    .data-item { text-align: center; }
    .data-item .value {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600; font-size: 24px;
        color: var(--gold);
    }
    .data-item .label {
        font-size: 13px; color: var(--text-dim);
        text-transform: uppercase; letter-spacing: 2px;
        margin-top: 3px;
    }

    /* ── Footer ── */
    .footer {
        position: absolute;
        bottom: 14%;
        left: 60px; right: 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
        border-top: 1px solid rgba(212,168,73,0.12);
        padding-top: 16px;
    }
    .date-text {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 600;
        font-size: 26px;
        color: var(--gold);
    }
    .cta {
        font-size: 17px;
        color: var(--text-dim);
        letter-spacing: 0.5px;
    }

    /* Corners */
    .corner { position: absolute; width: 40px; height: 40px; z-index: 5; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--gold); opacity: 0.2; }
    .corner::before { width: 100%; height: 1px; }
    .corner::after { width: 1px; height: 100%; }
    .corner.tl { top: 20px; left: 20px; }
    .corner.tl::before { top: 0; left: 0; }
    .corner.tl::after { top: 0; left: 0; }
    .corner.tr { top: 20px; right: 20px; }
    .corner.tr::before { top: 0; right: 0; }
    .corner.tr::after { top: 0; right: 0; }
    .corner.bl { bottom: 20px; left: 20px; }
    .corner.bl::before { bottom: 0; left: 0; }
    .corner.bl::after { bottom: 0; left: 0; }
    .corner.br { bottom: 20px; right: 20px; }
    .corner.br::before { bottom: 0; right: 0; }
    .corner.br::after { bottom: 0; right: 0; }
</style>
</head>
<body>
<div class="canvas">
    <div class="bg"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="top-bar">
        <div class="brand">Luz Estelar</div>
        <div class="moon-badge">
            <span>{{MOON_EMOJI}}</span>
            <span>{{MOON_PHASE}} {{MOON_PCT}}%</span>
        </div>
    </div>

    <div class="visual-zone">
        {{VISUAL_HTML}}
    </div>

    <div class="title-block">
        <div class="event-title">{{EVENT_TITLE}}</div>
        <div class="event-subtitle">{{EVENT_SUBTITLE}}</div>
        <div class="divider"></div>
    </div>

    <div class="fact-panel">
        <div class="fact-title">Dato Estelar</div>
        <div class="fact-text">{{FACT_TEXT}}</div>
    </div>

    <!-- Orbital arcs -->
    <div class="orbital-arc"></div>
    <div class="orbital-arc-2"></div>

    <div class="data-row">
        {{DATA_RIBBON_HTML}}
    </div>

    <div class="footer">
        <div class="date-text">{{DATE_TEXT}}</div>
        <div class="cta">@luzestelaroficial</div>
    </div>
</div>

<script>
(function() {
    const canvas = document.querySelector('.canvas');
    const seed = {{SEED}};
    let s = seed;
    function rng() { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; }
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.cssText = `left:${rng()*100}%;top:${rng()*100}%;width:${0.5+rng()*2}px;height:${0.5+rng()*2}px;opacity:${0.1+rng()*0.45}`;
        canvas.appendChild(star);
    }
})();
</script>
</body>
</html>
