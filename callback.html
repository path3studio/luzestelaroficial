<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luz Estelar — Authorization</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 50%, #0a0a2e 100%);
            color: #e8e0f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 16px;
        }
        h1 {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .code-box {
            background: rgba(0,0,0,0.3);
            border: 2px solid #ffd700;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 1.1em;
            word-break: break-all;
            color: #ffd700;
            cursor: pointer;
            user-select: all;
        }
        .status { color: #b8a0d0; margin-top: 15px; }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        button {
            background: rgba(255,215,0,0.15);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 10px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: rgba(255,215,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Luz Estelar</h1>
        <div id="content"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const state = params.get('state');
        const content = document.getElementById('content');

        if (code) {
            // If state starts with 'demo_', redirect back to local demo server
            if (state && state.startsWith('demo_')) {
                content.innerHTML = `
                    <p class="success">Authorization successful!</p>
                    <p class="status">Redirecting back to demo...</p>
                `;
                window.location.href = 'http://localhost:5555/?code=' + encodeURIComponent(code);
            } else {
                content.innerHTML = `
                    <p class="success">Authorization successful!</p>
                    <p class="status">Copy this code and paste it in the terminal:</p>
                    <div class="code-box" id="codeBox" onclick="copyCode()">${code}</div>
                    <button onclick="copyCode()">Copy Code</button>
                    <p class="status" id="copyStatus"></p>
                `;
            }
        } else if (error) {
            content.innerHTML = `
                <p class="error">Authorization failed</p>
                <p class="status">Error: ${error}</p>
                <p class="status">${params.get('error_description') || ''}</p>
            `;
        } else {
            content.innerHTML = `<p class="status">No authorization data received.</p>`;
        }

        function copyCode() {
            navigator.clipboard.writeText(code).then(() => {
                document.getElementById('copyStatus').textContent = 'Copied!';
            });
        }
    </script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(function(){});}</script>
</body>
</html>
