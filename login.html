<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Iniciar Sesión — Luz Estelar</title>
<link rel="alternate" hreflang="en" href="https://luzestelaroficial.com/en/login.html">
<link rel="alternate" hreflang="es" href="https://luzestelaroficial.com/login.html">
<link rel="icon" type="image/png" href="app_icon.png">
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4a849;--gold-light:#f0d078;--bg:#06061a;--text:rgba(255,255,255,0.88);--text-dim:rgba(255,255,255,0.55);--text-muted:rgba(255,255,255,0.35);--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);--accent-rose:#e8788a;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{
  position:absolute;width:2px;height:2px;
  background:var(--gold-light);border-radius:50%;
  animation:twinkle 3s ease-in-out infinite;
}
@keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.7;}}

/* Content */
.login-content{
  position:relative;z-index:1;
  width:100%;max-width:340px;
  padding:40px 24px;
  display:flex;flex-direction:column;align-items:center;
  gap:36px;
}

/* Logo */
.logo-section{text-align:center;}
.logo-star{
  font-size:3rem;display:block;margin-bottom:12px;
  animation:float 4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.logo-title{
  font-family:'Cormorant Garamond',serif;
  font-size:2.5rem;font-weight:700;color:var(--text);
  letter-spacing:0.02em;line-height:1.1;
}
.logo-subtitle{font-size:0.94rem;color:var(--text-dim);margin-top:8px;}

/* Login options */
.login-options{width:100%;display:flex;flex-direction:column;gap:16px;}

.google-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px;
  background:rgba(255,255,255,0.08);
  border:1px solid var(--glass-border);border-radius:14px;
  font-size:0.94rem;font-weight:500;color:var(--text);
  cursor:pointer;transition:background 0.2s;
  font-family:inherit;text-decoration:none;
}
.google-btn:active{background:rgba(255,255,255,0.12);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}

.separator{display:flex;align-items:center;gap:12px;}
.separator-line{flex:1;height:1px;background:var(--glass-border);}
.separator-text{font-size:0.75rem;color:var(--text-muted);}

.magic-form{display:flex;flex-direction:column;gap:10px;width:100%;}
.email-input{
  width:100%;padding:14px 16px;
  background:var(--glass);border:1px solid var(--glass-border);border-radius:14px;
  color:var(--text);font-family:inherit;font-size:0.94rem;outline:none;
  transition:border-color 0.2s;
}
.email-input::placeholder{color:var(--text-muted);}
.email-input:focus{border-color:var(--gold);}

.btn-gold{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--gold),#c89030);
  color:#1a1625;font-weight:700;font-size:0.95rem;
  cursor:pointer;font-family:inherit;
  transition:transform 0.2s,box-shadow 0.2s;
}
.btn-gold:active{transform:scale(0.98);}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

.error-text{font-size:0.81rem;color:var(--accent-rose);text-align:center;}

/* Sent state */
.sent-card{
  text-align:center;padding:28px 20px;
  background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.sent-icon{font-size:2.5rem;}
.sent-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--text);}
.sent-text{font-size:0.88rem;color:var(--text-dim);line-height:1.5;}
.sent-text strong{color:var(--gold);}
.btn-subtle{
  background:none;border:1px solid var(--glass-border);border-radius:10px;
  padding:10px 20px;color:var(--text-dim);font-size:0.85rem;
  cursor:pointer;font-family:inherit;transition:border-color 0.2s;
}
.btn-subtle:active{border-color:var(--gold);}

/* Legal */
.legal-text{font-size:0.69rem;color:var(--text-muted);text-align:center;line-height:1.5;}
.legal-text a{color:var(--gold);text-decoration:none;}

.hidden{display:none!important;}
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars-container"></div>

<div class="login-content">
  <!-- Logo -->
  <div class="logo-section">
    <span class="logo-star">&#x2728;</span>
    <h1 class="logo-title">Luz Estelar</h1>
    <p class="logo-subtitle">Tu guía cósmica personal</p>
  </div>

  <!-- Sent confirmation (hidden by default) -->
  <div class="sent-card hidden" id="sent-state">
    <span class="sent-icon">&#x2709;&#xFE0F;</span>
    <h2 class="sent-title">Revisa tu correo</h2>
    <p class="sent-text">Enviamos un link mágico a <strong id="sent-email"></strong>. Haz clic en el link para entrar.</p>
    <button class="btn-subtle" id="btn-retry">Usar otro correo</button>
  </div>

  <!-- Login options -->
  <div class="login-options" id="login-state">
    <!-- Google -->
    <a href="/api/auth/google?lang=es" class="google-btn" id="btn-google">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span>Continuar con Google</span>
    </a>

    <!-- Separator -->
    <div class="separator">
      <span class="separator-line"></span>
      <span class="separator-text">o</span>
      <span class="separator-line"></span>
    </div>

    <!-- Magic Link -->
    <form class="magic-form" id="magic-form">
      <input type="email" class="email-input" id="magic-email" placeholder="tu@email.com" required autocomplete="email" inputmode="email">
      <button type="submit" class="btn-gold" id="magic-btn">Enviar link mágico</button>
    </form>

    <p class="error-text hidden" id="error-msg"></p>
  </div>

  <!-- Legal -->
  <p class="legal-text">
    Al continuar aceptas los <a href="/terms-of-service.html">términos</a> y la <a href="/privacy-policy.html">privacidad</a>
  </p>
</div>

<script>
(function(){
  // Generate stars
  var container = document.getElementById('stars-container');
  for(var i=0;i<40;i++){
    var s=document.createElement('span');
    s.className='star';
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-delay:'+Math.random()*3+'s;opacity:'+(0.2+Math.random()*0.5);
    container.appendChild(s);
  }

  // Elements
  var loginState=document.getElementById('login-state');
  var sentState=document.getElementById('sent-state');
  var sentEmail=document.getElementById('sent-email');
  var form=document.getElementById('magic-form');
  var emailInput=document.getElementById('magic-email');
  var btn=document.getElementById('magic-btn');
  var errorEl=document.getElementById('error-msg');
  var btnRetry=document.getElementById('btn-retry');

  // Check if already logged in (cookie or token)
  (async function(){
    try{
      var headers={};
      var t=localStorage.getItem('le_token');
      if(t)headers['Authorization']='Bearer '+t;
      var r=await fetch('/api/auth/me',{cache:'no-store',credentials:'same-origin',headers:headers});
      if(r.ok){var d=await r.json();if(d.ok)window.location.href='/mi-dia.html';}
    }catch(e){}
  })();

  // Handle token from callback (deep link or redirect)
  var params=new URLSearchParams(location.search);
  var token=params.get('token');
  if(token){
    localStorage.setItem('le_token',token);
    window.location.href=params.get('redirect')||'/mi-dia.html';
  }

  // Magic link form
  form.addEventListener('submit',async function(e){
    e.preventDefault();
    if(!emailInput.value||btn.disabled)return;
    errorEl.classList.add('hidden');
    btn.disabled=true;btn.textContent='Enviando...';
    try{
      var r=await fetch('/api/auth/magic-link',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:emailInput.value,lang:'es'})
      });
      if(r.ok){
        sentEmail.textContent=emailInput.value;
        loginState.classList.add('hidden');
        sentState.classList.remove('hidden');
      }else{
        var msg=r.status===429?'Demasiados intentos. Espera unos minutos.':'Error al enviar el link. Intenta de nuevo.';
        errorEl.textContent=msg;errorEl.classList.remove('hidden');
        btn.disabled=false;btn.textContent='Enviar link mágico';
      }
    }catch(err){
      errorEl.textContent='Error de conexión. Intenta de nuevo.';
      errorEl.classList.remove('hidden');
      btn.disabled=false;btn.textContent='Enviar link mágico';
    }
  });

  // Retry button
  btnRetry.addEventListener('click',function(){
    sentState.classList.add('hidden');
    loginState.classList.remove('hidden');
    emailInput.value='';btn.disabled=false;btn.textContent='Enviar link mágico';
  });
})();
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}</script>
</body>
</html>
