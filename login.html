<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Luz Estelar</title>
    <meta name="description" content="Inicia sesión en tu cuenta de Luz Estelar para acceder a tu dashboard astrologico personalizado.">
    <meta name="robots" content="noindex">
    <link rel="alternate" hreflang="en" href="https://luzestelaroficial.com/en/login.html">
    <link rel="alternate" hreflang="es" href="https://luzestelaroficial.com/login.html">
    <link rel="icon" type="image/png" href="app_icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--gold:#d4a849;--gold-light:#f0d078;--gold-dim:rgba(212,168,73,0.15);--bg-deep:#06061a;--bg-mid:#0c0c2a;--text:#e0dce8;--text-dim:#9890a8;--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);--accent-purple:#7c5cbf;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg-deep);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
        .starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

        .login-container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px;}

        .login-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:48px 32px;text-align:center;backdrop-filter:blur(12px);}

        .login-card .logo{font-family:'Cormorant Garamond',serif;font-size:2.2em;font-weight:700;color:var(--gold);text-decoration:none;display:block;margin-bottom:8px;}
        .login-card .tagline{font-size:0.88em;color:var(--text-dim);margin-bottom:36px;}

        .divider{display:flex;align-items:center;gap:12px;margin:28px 0;color:var(--text-dim);font-size:0.78em;}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--glass-border);}

        /* Google button */
        .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:12px;border:1px solid var(--glass-border);border-radius:10px;background:rgba(255,255,255,0.06);color:var(--text);font-size:0.92em;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit;text-decoration:none;}
        .btn-google:hover{background:rgba(255,255,255,0.1);border-color:var(--gold);}
        .btn-google svg{width:20px;height:20px;}

        /* Email form */
        .form-group{margin-bottom:16px;text-align:left;}
        .form-group label{display:block;font-size:0.82em;color:var(--text-dim);margin-bottom:6px;font-weight:500;}
        .form-group input{width:100%;padding:11px 14px;border:1px solid var(--glass-border);border-radius:8px;background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9em;outline:none;transition:border-color 0.3s;font-family:inherit;}
        .form-group input:focus{border-color:var(--gold);}
        .btn-primary{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold),#c89030);color:#1a1625;font-weight:700;font-size:0.95em;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(212,168,73,0.3);}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

        .success-msg{background:rgba(72,187,120,0.1);border:1px solid rgba(72,187,120,0.3);border-radius:10px;padding:16px;margin-top:16px;color:#68d391;font-size:0.88em;display:none;}
        .error-msg{background:rgba(245,101,101,0.1);border:1px solid rgba(245,101,101,0.3);border-radius:10px;padding:12px;margin-top:12px;color:#fc8181;font-size:0.85em;display:none;}

        .back-link{display:inline-block;margin-top:24px;color:var(--text-dim);font-size:0.82em;text-decoration:none;transition:color 0.2s;}
        .back-link:hover{color:var(--gold);}

        .lang-switch{position:fixed;top:16px;right:16px;z-index:10;font-size:0.8em;}
        .lang-switch a{color:var(--text-dim);text-decoration:none;transition:color 0.2s;}
        .lang-switch a:hover{color:var(--gold);}

        @media(max-width:480px){
            .login-card{padding:36px 20px;}
        }
    </style>
</head>
<body>
    <div class="starfield"><canvas id="stars"></canvas></div>
    <div class="lang-switch"><a href="/en/login.html">English</a></div>

    <div class="login-container">
        <div class="login-card">
            <a href="/" class="logo">Luz Estelar</a>
            <p class="tagline">Tu mapa astral personalizado te espera</p>

            <!-- Google OAuth -->
            <a href="/api/auth/google?lang=es" class="btn-google">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continuar con Google
            </a>

            <div class="divider">o usa tu email</div>

            <!-- Magic Link -->
            <form id="magic-form">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="magic-email" placeholder="tu@email.com" required>
                </div>
                <button type="submit" class="btn-primary" id="magic-btn">Enviar enlace mágico</button>
                <div class="success-msg" id="magic-success">
                    Revisa tu bandeja de entrada. Te enviamos un enlace para iniciar sesión.
                </div>
                <div class="error-msg" id="magic-error"></div>
            </form>

            <a href="/" class="back-link">Volver al inicio</a>
        </div>
    </div>

    <script>
    // Starfield
    (function(){var c=document.getElementById('stars');var ctx=c.getContext('2d');var w,h,stars=[];function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight;}function init(){resize();stars=[];for(var i=0;i<120;i++){stars.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+0.2,a:Math.random()*0.4+0.1,speed:Math.random()*0.12+0.01,phase:Math.random()*Math.PI*2});}}function draw(){ctx.clearRect(0,0,w,h);var t=Date.now()*0.001;stars.forEach(function(s){var f=0.5+0.5*Math.sin(t*s.speed*6+s.phase);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+s.a*f+')';ctx.fill();});requestAnimationFrame(draw);}init();draw();window.addEventListener('resize',init);})();

    // Check if already logged in
    (async function(){
        try {
            var res = await fetch('/api/auth/me', {cache: 'no-store', credentials: 'same-origin'});
            if (res.ok) {
                var data = await res.json();
                if (data.ok) window.location.href = '/dashboard.html';
            }
        } catch(e) {}
    })();

    // Magic Link
    document.getElementById('magic-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('magic-btn');
        var email = document.getElementById('magic-email').value;
        var successEl = document.getElementById('magic-success');
        var errorEl = document.getElementById('magic-error');

        btn.disabled = true;
        btn.textContent = 'Enviando...';
        successEl.style.display = 'none';
        errorEl.style.display = 'none';

        try {
            var res = await fetch('/api/auth/magic-link', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email, lang: 'es'})
            });
            var data = await res.json();
            if (data.ok) {
                successEl.style.display = 'block';
                btn.textContent = 'Enlace enviado';
            } else {
                errorEl.textContent = data.error || 'Error al enviar el enlace';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Enviar enlace mágico';
            }
        } catch(err) {
            errorEl.textContent = 'Error de conexión. Intenta de nuevo.';
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Enviar enlace mágico';
        }
    });
    </script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}</script>
    <script src="/js/cookie-consent.js" defer></script>
</body>
</html>
