<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System status — Luz Estelar</title>
<meta name="description" content="Real-time status of Luz Estelar systems: site, backups and monitoring.">
<link rel="alternate" hreflang="es" href="https://luzestelaroficial.com/status.html">
<link rel="alternate" hreflang="en" href="https://luzestelaroficial.com/en/status.html">
<link rel="canonical" href="https://luzestelaroficial.com/en/status.html">
<style>
:root{
  --gold:#d4a849;--bg-deep:#06061a;--bg-panel:#0e0d22;--text:#e0dce8;--text-dim:#9890a8;
  --ok:#5cd99e;--degraded:#f0c674;--down:#ff6b6b;--border:rgba(212,168,73,.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-deep);color:var(--text);min-height:100vh;padding:32px 20px;line-height:1.6;}
.wrap{max-width:680px;margin:0 auto;}
header{text-align:center;margin-bottom:32px;}
h1{font-size:1.8em;color:var(--gold);font-weight:600;margin-bottom:6px;}
.tagline{color:var(--text-dim);font-size:.9em;}
.lang{position:absolute;top:20px;right:20px;color:var(--text-dim);font-size:.85em;text-decoration:none;border:1px solid var(--border);padding:6px 12px;border-radius:6px;}
.lang:hover{color:var(--gold);border-color:var(--gold);}
.overall{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px;text-align:center;}
.overall .dot{display:inline-block;width:14px;height:14px;border-radius:50%;margin-right:10px;vertical-align:middle;}
.overall .label{font-size:1.4em;font-weight:600;vertical-align:middle;}
.overall.ok{border-color:rgba(92,217,158,.35);}
.overall.degraded{border-color:rgba(240,198,116,.35);}
.overall.down{border-color:rgba(255,107,107,.35);}
.dot.ok{background:var(--ok);box-shadow:0 0 12px rgba(92,217,158,.5);}
.dot.degraded{background:var(--degraded);box-shadow:0 0 12px rgba(240,198,116,.5);}
.dot.down{background:var(--down);box-shadow:0 0 12px rgba(255,107,107,.5);}
.component{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.component .info{flex:1;}
.component .name{font-weight:600;color:var(--text);margin-bottom:3px;}
.component .desc{color:var(--text-dim);font-size:.85em;}
.component .badge{font-size:.75em;font-weight:600;text-transform:uppercase;padding:5px 11px;border-radius:6px;letter-spacing:.5px;white-space:nowrap;}
.badge.ok{background:rgba(92,217,158,.15);color:var(--ok);}
.badge.degraded{background:rgba(240,198,116,.15);color:var(--degraded);}
.badge.down{background:rgba(255,107,107,.15);color:var(--down);}
.meta{text-align:center;color:var(--text-dim);font-size:.78em;margin-top:24px;}
.meta a{color:var(--gold);text-decoration:none;}
.meta a:hover{text-decoration:underline;}
.loading{text-align:center;color:var(--text-dim);padding:40px;}
.error{text-align:center;color:var(--down);padding:24px;border:1px solid rgba(255,107,107,.3);border-radius:10px;}
@media(max-width:520px){
  .component{flex-direction:column;align-items:flex-start;gap:8px;}
  .lang{position:static;display:inline-block;margin:0 auto 16px;}
  header{position:relative;}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="/status.html" class="lang">ES</a>
  <header>
    <h1>&#11088; System status</h1>
    <p class="tagline">Live status of Luz Estelar &mdash; refreshes every minute</p>
  </header>
  <div id="content"><div class="loading">Loading...</div></div>
  <p class="meta">
    Generated <span id="generated">&mdash;</span> &middot;
    <a href="/en/">Back home</a> &middot;
    <a href="https://luzestelaroficial.com/api/status" target="_blank" rel="noopener">JSON</a>
  </p>
</div>
<script>
const LABELS = {
  site: { name: 'Website', desc: 'API, database and daily content' },
  backup: { name: 'D1 backups', desc: 'Weekly snapshots in R2 with verification' },
  usage: { name: 'Usage monitor', desc: 'D1 / R2 / KV quotas vs free-tier limits' },
  performance: { name: 'Performance', desc: 'Response times (last 24h)' },
};
const SEVERITY_LABEL = {
  ok: 'Operational',
  degraded: 'Degraded',
  down: 'Down',
};
const OVERALL_LABEL = {
  ok: 'All systems operational',
  degraded: 'Some systems degraded',
  down: 'Active incident',
};

function fmtAge(hours) {
  if (hours == null) return 'no data';
  if (hours < 1) return 'less than 1h ago';
  if (hours < 48) return hours + 'h ago';
  return Math.round(hours / 24) + 'd ago';
}

async function load() {
  const root = document.getElementById('content');
  try {
    const r = await fetch('/api/status', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    render(data);
  } catch (e) {
    root.innerHTML = '<div class="error">Could not load status: ' + (e.message || e) + '</div>';
  }
}

function render(data) {
  const root = document.getElementById('content');
  let html = '<div class="overall ' + data.overall + '">' +
    '<span class="dot ' + data.overall + '"></span>' +
    '<span class="label">' + OVERALL_LABEL[data.overall] + '</span>' +
    '</div>';

  for (const [key, comp] of Object.entries(data.components)) {
    const meta = LABELS[key] || { name: key, desc: '' };
    let desc = meta.desc;
    if (comp.age_hours != null) {
      if (key === 'backup') desc += ' &middot; last backup ' + fmtAge(comp.age_hours);
      if (key === 'usage') desc += ' &middot; last report ' + fmtAge(comp.age_hours);
    }
    if (key === 'performance') {
      if (comp.samples === 0) {
        desc += ' &middot; no samples yet';
      } else if (comp.api_ttfb_p95_ms != null && comp.home_total_p95_ms != null) {
        desc += ' &middot; API p95 ' + comp.api_ttfb_p95_ms + 'ms &middot; home p95 ' + comp.home_total_p95_ms + 'ms';
      } else if (comp.note) {
        desc += ' &middot; ' + comp.note;
      }
    }
    html += '<div class="component">' +
      '<div class="info"><div class="name">' + meta.name + '</div>' +
      '<div class="desc">' + desc + '</div></div>' +
      '<span class="badge ' + comp.severity + '">' + SEVERITY_LABEL[comp.severity] + '</span>' +
      '</div>';
  }

  root.innerHTML = html;
  const gen = document.getElementById('generated');
  try {
    gen.textContent = new Date(data.generated_at).toLocaleString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
    });
  } catch { gen.textContent = data.generated_at; }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
